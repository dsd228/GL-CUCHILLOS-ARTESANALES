<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GL Cuchillos · Producto</title>
<meta name="description" content="Cuchillos artesanales forjados a mano por Gonzalo Londero. Desde Quimilí, Santiago del Estero, Argentina.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100;0,200;0,300;0,400;0,600;0,700;1,100;1,200;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Josefin Sans',sans-serif;background:#080808;color:#E8E0D0;overflow-x:hidden}
img{display:block;max-width:100%}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer}

:root{
–jet:#080808;–jet2:#0E0E0E;–jet3:#141414;–jet4:#1A1A1A;–jet5:#222;
–silver:#C8CDD6;–silver2:#DDE1E8;–silver3:#8E96A2;
–silver-line:rgba(200,205,214,.16);
–cream:#E8E0D0;–cream2:#C8BCA8;–muted:#787060;
–serif:‘Playfair Display’,serif;–sans:‘Josefin Sans’,sans-serif;
–ease:cubic-bezier(.22,1,.36,1);
}

@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes ld{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
@keyframes shimmer{from{background-position:-200% 0}to{background-position:200% 0}}

/* ── NAV ── */
nav{
position:fixed;top:0;left:0;right:0;z-index:800;
display:flex;align-items:center;justify-content:space-between;
padding:0 clamp(1.5rem,4vw,4rem);height:72px;
background:rgba(8,8,8,.97);border-bottom:1px solid var(–silver-line);
backdrop-filter:blur(20px);
}
.nav-brand{display:flex;align-items:center;gap:14px;text-decoration:none}
.nav-logo-svg{width:44px;height:44px;flex-shrink:0}
.nav-brand-text{display:flex;flex-direction:column}
.nav-brand-name{font-family:var(–serif);font-size:13px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(–cream);line-height:1.1}
.nav-brand-sub{font-size:8px;font-weight:400;letter-spacing:.2em;text-transform:uppercase;color:var(–silver);margin-top:2px}
.nav-actions{display:flex;align-items:center;gap:1rem}
.nav-back{display:flex;align-items:center;gap:.5rem;font-size:9.5px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:rgba(200,205,214,.6);transition:color .2s}
.nav-back:hover{color:var(–cream)}
.nav-back svg{transition:transform .2s}
.nav-back:hover svg{transform:translateX(-3px)}
.nav-wa-btn{display:flex;align-items:center;gap:.5rem;font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(–jet);background:var(–silver);padding:.45rem 1.2rem;transition:background .2s;white-space:nowrap}
.nav-wa-btn:hover{background:var(–silver2)}

/* ── PAGE ── */
.page{max-width:1360px;margin:0 auto;padding:clamp(5.5rem,11vh,7.5rem) clamp(1.5rem,4vw,4rem) clamp(4rem,8vh,6rem)}

/* ── LOADING ── */
.loading-screen{min-height:80vh;display:flex;align-items:center;justify-content:center;gap:6px}
.loading-dot{width:6px;height:6px;border-radius:50%;background:var(–silver);animation:ld .8s ease-in-out infinite}
.loading-dot:nth-child(2){animation-delay:.12s}
.loading-dot:nth-child(3){animation-delay:.24s}

/* ── NOT FOUND ── */
.not-found{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:1.5rem;animation:rise .7s var(–ease) forwards}
.not-found-ico{font-size:3rem;opacity:.3}
.not-found h2{font-family:var(–sans);font-weight:200;font-size:clamp(1.4rem,3vw,2.2rem);letter-spacing:.2em;text-transform:uppercase;color:var(–cream)}
.not-found p{font-size:.9rem;font-weight:300;color:var(–muted);max-width:340px;line-height:1.8}

/* ── BREADCRUMB ── */
.breadcrumb{display:flex;align-items:center;gap:.5rem;font-size:9px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(–muted);margin-bottom:2.5rem;animation:rise .5s var(–ease) forwards;flex-wrap:wrap}
.breadcrumb a{color:var(–silver3);transition:color .2s}
.breadcrumb a:hover{color:var(–silver)}
.breadcrumb .bc-sep{color:rgba(200,205,214,.2)}
.breadcrumb .bc-current{color:var(–cream2);max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── MAIN PRODUCT LAYOUT ── */
.prod-layout{
display:grid;
grid-template-columns:1fr 1fr;
gap:clamp(3rem,6vw,8rem);
align-items:start;
margin-bottom:clamp(4rem,8vh,7rem);
}

/* ── GALLERY ── */
.gallery{position:sticky;top:88px}

/* Main image */
.gallery-main{
position:relative;
aspect-ratio:1/1.1;
background:var(–jet3);
border:1px solid var(–silver-line);
overflow:hidden;
display:flex;align-items:center;justify-content:center;
margin-bottom:.7rem;
animation:fade .7s var(–ease) forwards;
}
.gallery-main img{
width:88%;height:88%;
object-fit:contain;
transition:transform .7s var(–ease);
}
.gallery-main img:hover{transform:scale(1.05)}
.gallery-main video{width:100%;height:100%;object-fit:cover}
.gal-art-placeholder{
position:absolute;inset:0;
display:flex;align-items:center;justify-content:center;
}
.gal-art-placeholder svg{width:45%;opacity:.14;color:var(–cream)}

/* Zoom overlay */
.gallery-main.zoomable{cursor:zoom-in}
.gallery-main.zoomed{cursor:zoom-out}
.gallery-main.zoomed img{transform:scale(1.9);cursor:zoom-out}

/* Badges */
.gal-badge-avail,.gal-badge-custom,.gal-badge-intl,.gal-badge-unavail{
position:absolute;top:1rem;left:1rem;
font-size:8px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
padding:.3rem .7rem;z-index:3;
}
.gal-badge-avail{background:var(–silver);color:var(–jet)}
.gal-badge-custom{background:transparent;color:var(–silver);border:1px solid rgba(200,205,214,.4)}
.gal-badge-intl{background:var(–jet4);color:var(–cream2);border:1px solid var(–silver-line)}
.gal-badge-unavail{background:transparent;color:var(–muted);border:1px solid rgba(120,112,96,.3)}

.gal-promo{
position:absolute;top:1rem;right:1rem;
background:var(–silver);color:var(–jet);
font-size:8px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
padding:.3rem .7rem;z-index:3;
}

/* Navigation arrows */
.gal-arrow{
position:absolute;top:50%;transform:translateY(-50%);
width:38px;height:38px;border:1px solid rgba(200,205,214,.2);
background:rgba(8,8,8,.72);backdrop-filter:blur(8px);
display:grid;place-items:center;color:var(–silver);
transition:background .2s,border-color .2s;z-index:4;
opacity:0;pointer-events:none;
}
.gallery-main:hover .gal-arrow{opacity:1;pointer-events:all}
.gal-arrow:hover{background:rgba(200,205,214,.12);border-color:var(–silver)}
.gal-arrow-prev{left:.7rem}
.gal-arrow-next{right:.7rem}
.gal-arrow:disabled{opacity:.25;pointer-events:none}

/* Media counter */
.gal-counter{
position:absolute;bottom:.7rem;right:.7rem;z-index:3;
font-size:8px;font-weight:600;letter-spacing:.14em;
background:rgba(8,8,8,.7);backdrop-filter:blur(6px);
padding:.25rem .6rem;color:rgba(200,205,214,.6);
border:1px solid rgba(200,205,214,.1);
}

/* Thumbnails */
.gallery-thumbs{
display:flex;gap:.5rem;overflow-x:auto;scrollbar-width:thin;scrollbar-color:rgba(200,205,214,.2) transparent;
}
.gallery-thumbs::-webkit-scrollbar{height:3px}
.gallery-thumbs::-webkit-scrollbar-thumb{background:rgba(200,205,214,.2)}
.gallery-thumb{
flex-shrink:0;width:68px;height:68px;
border:1.5px solid var(–silver-line);
overflow:hidden;background:var(–jet3);
cursor:pointer;transition:border-color .2s;
display:flex;align-items:center;justify-content:center;
position:relative;
}
.gallery-thumb.active{border-color:var(–silver)}
.gallery-thumb:hover{border-color:rgba(200,205,214,.45)}
.gallery-thumb img{width:100%;height:100%;object-fit:cover}
.gallery-thumb-art{width:60%;opacity:.2;color:var(–cream)}
.gal-thumb-play{
position:absolute;inset:0;background:rgba(8,8,8,.5);
display:flex;align-items:center;justify-content:center;color:var(–silver);
}
/* Add photo placeholder (shown to admin) */
.gallery-thumb.add-placeholder{
border:1.5px dashed rgba(200,205,214,.2);
color:rgba(200,205,214,.3);
font-size:22px;
cursor:default;
}

/* Origin badges */
.gallery-origin{
position:absolute;bottom:.7rem;left:.7rem;z-index:3;
display:flex;flex-direction:column;gap:.3rem;align-items:flex-start;
}
.origin-flag{
font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
padding:.22rem .55rem;background:rgba(8,8,8,.78);border:1px solid rgba(200,205,214,.15);
backdrop-filter:blur(6px);color:rgba(232,224,208,.75);
display:flex;align-items:center;gap:.3rem;white-space:nowrap;
}

/* ── PRODUCT INFO ── */
.prod-info{animation:rise .7s .12s var(–ease) both}
.prod-info-cat{
font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
color:var(–silver);display:flex;align-items:center;gap:.7rem;margin-bottom:1.2rem;
}
.prod-info-cat::before{content:’’;width:22px;height:1px;background:var(–silver)}
.prod-info-name{
font-family:var(–sans);font-weight:200;
font-size:clamp(1.8rem,3.8vw,3rem);
color:var(–cream);line-height:1.08;letter-spacing:.14em;text-transform:uppercase;margin-bottom:1.4rem;
}
.prod-info-desc{
font-size:.93rem;font-weight:300;color:var(–cream2);
line-height:1.95;margin-bottom:2rem;
border-left:2px solid var(–silver-line);padding-left:1.3rem;
}

/* Tech specs chips */
.prod-specs-chips{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:1.8rem}
.prod-spec-chip{
font-size:7.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;
padding:.25rem .65rem;border:1px solid var(–silver-line);color:var(–muted);
transition:border-color .2s,color .2s;
}
.prod-spec-chip:hover{border-color:rgba(200,205,214,.4);color:var(–cream2)}

/* Wood swatch */
.prod-wood-swatch{
display:flex;align-items:center;gap:.9rem;
padding:.8rem 1.1rem;
background:rgba(200,205,214,.03);border:1px solid rgba(200,205,214,.08);
margin-bottom:1.8rem;
}
.wood-swatch-bar{height:36px;width:80px;flex-shrink:0;border:1px solid rgba(200,205,214,.12)}
.wood-swatch-info{display:flex;flex-direction:column;gap:.25rem}
.wood-swatch-label{font-size:8px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(–silver3)}
.wood-swatch-name{font-family:var(–serif);font-style:italic;font-size:1rem;color:var(–cream2)}

/* Price block */
.prod-price-block{
padding:1.6rem 0;
border-top:1px solid var(–silver-line);
border-bottom:1px solid var(–silver-line);
margin-bottom:2rem;
display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap;
}
.prod-price-left{}
.prod-price-label{font-size:8px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(–muted);margin-bottom:.35rem}
.prod-price-val{font-family:var(–serif);font-style:italic;font-size:2.2rem;color:var(–silver);font-weight:400;line-height:1}
.prod-price-note{font-size:9px;font-weight:400;letter-spacing:.12em;color:var(–muted);text-transform:uppercase;margin-top:.3rem}
.prod-stock-badge{
font-size:8px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
padding:.35rem .8rem;border:1px solid;
align-self:center;
}

/* Action buttons */
.prod-actions{display:flex;flex-direction:column;gap:.7rem;margin-bottom:2rem}
.btn-pay{
display:inline-flex;align-items:center;justify-content:center;gap:.7rem;
width:100%;padding:1rem 1.5rem;
background:rgba(0,158,227,.14);color:#5bc8f5;
border:1px solid rgba(0,158,227,.4);
font-family:var(–sans);font-size:9.5px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
transition:background .2s,border-color .2s,transform .15s;text-decoration:none;
}
.btn-pay:hover{background:rgba(0,158,227,.24);border-color:#00a8e0;transform:translateY(-1px)}
.btn-wa-full{
display:inline-flex;align-items:center;justify-content:center;gap:.7rem;
padding:.95rem 1.5rem;
background:rgba(37,211,102,.1);color:#4dcc7a;
border:1px solid rgba(37,211,102,.35);
font-family:var(–sans);font-size:9.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
width:100%;transition:background .2s,border-color .2s,transform .15s;text-decoration:none;
}
.btn-wa-full:hover{background:rgba(37,211,102,.2);border-color:#25D366;transform:translateY(-1px)}
.btn-outline-full{
display:inline-flex;align-items:center;justify-content:center;gap:.7rem;
padding:.9rem 1.5rem;
background:transparent;color:rgba(232,224,208,.55);
border:1px solid rgba(200,205,214,.22);
font-family:var(–sans);font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
width:100%;transition:border-color .2s,color .2s;text-decoration:none;
}
.btn-outline-full:hover{border-color:var(–silver);color:var(–cream)}

/* Meta badges */
.prod-meta{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:2rem}
.prod-meta-badge{
display:flex;align-items:center;gap:.5rem;
font-size:8px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
color:var(–muted);padding:.35rem .75rem;
border:1px solid rgba(200,205,214,.1);background:rgba(200,205,214,.03);
}
.prod-meta-badge svg{color:var(–silver3);flex-shrink:0}

/* ── FULL SPECS TABLE ── */
.specs-section{
border-top:1px solid var(–silver-line);
padding-top:2rem;margin-top:1rem;
}
.specs-title{
font-size:9px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;
color:var(–silver);display:flex;align-items:center;gap:.7rem;margin-bottom:1.5rem;
}
.specs-title::before{content:’’;width:18px;height:1px;background:var(–silver)}
.specs-table{
display:grid;grid-template-columns:1fr 1fr;
gap:0;border:1px solid var(–silver-line);
}
.spec-row{
display:flex;flex-direction:column;
padding:.85rem 1.1rem;border-right:1px solid var(–silver-line);border-bottom:1px solid var(–silver-line);
transition:background .25s;
}
.spec-row:nth-child(2n){border-right:none}
.spec-row:nth-last-child(-n+2){border-bottom:none}
.spec-row:hover{background:rgba(200,205,214,.03)}
.spec-row-label{font-size:8px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(–silver3);margin-bottom:.3rem}
.spec-row-val{font-size:.88rem;font-weight:300;color:var(–cream2);letter-spacing:.04em}
.spec-row-val strong{color:var(–cream);font-weight:500}

/* Full-width spec row */
.spec-row.full{grid-column:1/-1;border-right:none}

/* Características tags */
.spec-row.chars{grid-column:1/-1;border-right:none}
.spec-chars-tags{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.4rem}
.spec-char-tag{
font-size:7.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
padding:.25rem .6rem;border:1px solid var(–silver-line);color:var(–silver3);
background:rgba(200,205,214,.03);
}

/* ── RELATED ── */
.related-section{
border-top:1px solid var(–silver-line);
padding-top:clamp(3rem,6vh,5rem);
margin-top:clamp(3rem,6vh,5rem);
}
.sec-label{
font-size:9px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;
color:var(–silver);display:flex;align-items:center;gap:.8rem;margin-bottom:1.2rem;
}
.sec-label::before{content:’’;width:22px;height:1px;background:var(–silver)}
.sec-h2{
font-family:var(–sans);font-weight:200;
font-size:clamp(1.4rem,2.8vw,2.4rem);
color:var(–cream);line-height:1.1;letter-spacing:.14em;text-transform:uppercase;margin-bottom:2rem;
}
.sec-h2 em{font-style:normal;font-weight:100;color:var(–silver)}
.related-grid{
display:grid;grid-template-columns:repeat(3,1fr);
border:1px solid var(–silver-line);
}
.rel-card{
border-right:1px solid var(–silver-line);background:var(–jet);
overflow:hidden;cursor:pointer;transition:background .3s;display:flex;flex-direction:column;
}
.rel-card:last-child{border-right:none}
.rel-card:hover{background:var(–jet3)}
.rel-img{
aspect-ratio:1;background:var(–jet2);
display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.rel-img img{width:85%;height:85%;object-fit:contain;transition:transform .6s var(–ease)}
.rel-card:hover .rel-img img{transform:scale(1.04)}
.rel-img svg{width:45%;opacity:.14;color:var(–cream)}
.rel-body{padding:1.3rem 1.5rem;flex:1;display:flex;flex-direction:column}
.rel-cat{font-size:8px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(–silver);margin-bottom:.35rem}
.rel-name{font-family:var(–sans);font-size:.82rem;font-weight:300;color:var(–cream);letter-spacing:.16em;text-transform:uppercase;margin-bottom:auto}
.rel-empunadura{font-size:.75rem;font-weight:300;color:var(–muted);margin-top:.4rem;letter-spacing:.04em}
.rel-price{font-family:var(–serif);font-style:italic;font-size:.95rem;color:rgba(200,205,214,.7);margin-top:.6rem}
.rel-wood-bar{height:3px;width:100%}

/* ── FOOTER ── */
footer{
border-top:1px solid var(–silver-line);
padding:2rem clamp(1.5rem,4vw,4rem);
display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;
}
.footer-brand{font-family:var(–serif);font-style:italic;font-size:1.2rem;color:var(–silver)}
.footer-copy{font-size:.7rem;font-weight:300;color:rgba(200,205,214,.2);letter-spacing:.08em}
.footer-back{
font-size:9px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
color:var(–muted);transition:color .2s;
display:flex;align-items:center;gap:.5rem;
}
.footer-back:hover{color:var(–silver)}

/* ── LIGHTBOX ── */
.lightbox{
position:fixed;inset:0;z-index:3000;
background:rgba(4,4,4,.96);backdrop-filter:blur(14px);
display:flex;align-items:center;justify-content:center;
opacity:0;pointer-events:none;transition:opacity .3s;
}
.lightbox.open{opacity:1;pointer-events:all}
.lb-img{max-width:90vw;max-height:88vh;object-fit:contain;user-select:none}
.lb-close{position:absolute;top:1.5rem;right:1.5rem;background:none;border:none;color:rgba(200,205,214,.6);font-size:1.6rem;cursor:pointer;transition:color .2s;padding:.5rem}
.lb-close:hover{color:var(–cream)}
.lb-arrow{
position:absolute;top:50%;transform:translateY(-50%);
width:52px;height:52px;border:1px solid rgba(200,205,214,.2);
background:rgba(8,8,8,.7);backdrop-filter:blur(8px);
display:grid;place-items:center;color:var(–silver);
transition:background .2s,border-color .2s;
}
.lb-arrow:hover{background:rgba(200,205,214,.12);border-color:var(–silver)}
.lb-arrow-prev{left:1.5rem}
.lb-arrow-next{right:1.5rem}
.lb-counter{
position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);
font-size:9px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;
color:rgba(200,205,214,.5);
}
.lb-caption{
position:absolute;bottom:3.5rem;left:50%;transform:translateX(-50%);
font-size:10px;font-weight:300;letter-spacing:.1em;color:rgba(200,205,214,.4);
white-space:nowrap;
}

/* ── RESPONSIVE ── */
@media(max-width:900px){
.prod-layout{grid-template-columns:1fr}
.gallery{position:static}
.related-grid{grid-template-columns:1fr 1fr}
.rel-card:last-child{display:none}
}
@media(max-width:640px){
.specs-table{grid-template-columns:1fr}
.spec-row{border-right:none}
.spec-row:nth-last-child(-n+2){border-bottom:1px solid var(–silver-line)}
.spec-row:last-child{border-bottom:none}
.related-grid{grid-template-columns:1fr}
.rel-card{border-right:none!important;border-bottom:1px solid var(–silver-line)}
.rel-card:last-child{display:flex;border-bottom:none}
.lb-arrow{width:40px;height:40px}
.nav-wa-btn{display:none}
}
</style>

</head>
<body>

<!-- NAV -->

<nav>

/* ═══════════════════════════════════════════════

const WOOD_DEFAULT = {g:'linear-gradient(90deg,#1a1a1a,#2a2a2a,#3a3a3a,#222222)',c:'#2a2a2a'};

function woodInfo(str) {
  if (!str) return WOOD_DEFAULT;
  const s = str.toLowerCase();
  const keys = Object.keys(WOOD_MAP).sort((a,b) => b.length - a.length);
  for (const k of keys) { if (s.includes(k)) return WOOD_MAP[k]; }
  return WOOD_DEFAULT;
}

/* ═══════════════════════════════════════════════
   BADGE HELPERS
═══════════════════════════════════════════════ */
const BADGE = {
  avail:   {cls:'gal-badge-avail',  txt:'Disponible'},
  custom:  {cls:'gal-badge-custom', txt:'A pedido'},
  intl:    {cls:'gal-badge-intl',   txt:'Internacional'},
  unavail: {cls:'gal-badge-unavail',txt:'No disponible'},
};
function badge(p) {
  const b = BADGE[p.badge] || BADGE.avail;
  return {cls: b.cls, txt: p.badgeText || b.txt};
}

function stockBadgeStyle(stock) {
  if (stock === 0) return {text:'Sin stock',color:'rgba(200,80,80,.9)'};
  if (stock > 0)   return {text:`${stock} disponible${stock>1?'s':''}`,color:'rgba(80,200,120,.9)'};
  return {text:'Consultar stock',color:'rgba(200,205,214,.4)'};
}

/* ═══════════════════════════════════════════════
   KNIFE ARTS (placeholder SVGs)
═══════════════════════════════════════════════ */
const KNIFE_ARTS = [
  `<svg viewBox="0 0 240 360" fill="none"><path d="M50 120 L190 80 Q210 78 210 96 L190 130 L50 144 Z" fill="currentColor" opacity=".75"/><rect x="44" y="118" width="10" height="28" rx="1" fill="currentColor" opacity=".6"/><path d="M26 146 Q24 204 28 280 L40 280 Q42 204 40 146Z" fill="currentColor" opacity=".55"/><circle cx="33" cy="180" r="3.5" fill="currentColor" opacity=".9"/><circle cx="33" cy="225" r="3.5" fill="currentColor" opacity=".9"/></svg>`,
  `<svg viewBox="0 0 220 400" fill="none"><path d="M110 25 L205 145 Q214 162 204 174 L110 170Z" fill="currentColor" opacity=".8"/><rect x="102" y="165" width="16" height="8" rx="1" fill="currentColor"/><path d="M104 173 Q103 230 106 310 L116 310 Q119 230 118 173Z" fill="currentColor" opacity=".6"/><circle cx="110" cy="205" r="3" fill="currentColor"/><circle cx="110" cy="245" r="3" fill="currentColor"/><circle cx="110" cy="285" r="3" fill="currentColor"/></svg>`,
  `<svg viewBox="0 0 220 400" fill="none"><path d="M110 30 L210 160 Q218 178 208 190 L110 184Z" fill="currentColor" opacity=".7"/><path d="M107 182 Q106 236 108 298 L114 298 Q116 236 114 182Z" fill="currentColor" opacity=".5"/><rect x="103" y="178" width="14" height="8" rx="1" fill="currentColor"/><ellipse cx="110" cy="218" rx="4" ry="3" fill="currentColor" opacity=".85"/><ellipse cx="110" cy="258" rx="4" ry="3" fill="currentColor" opacity=".85"/></svg>`,
];
const knifeArt = (i=0) => `<div class="gal-art-placeholder"><svg style="width:45%;opacity:.14;color:var(--cream)" viewBox="${KNIFE_ARTS[i%KNIFE_ARTS.length].match(/viewBox="([^"]+)"/)?.[1]||'0 0 240 360'}">${KNIFE_ARTS[i%KNIFE_ARTS.length].replace(/^<svg[^>]*>/,'').replace(/<\/svg>$/,'')}</svg></div>`;

/* ═══════════════════════════════════════════════
   GALLERY STATE
═══════════════════════════════════════════════ */
let galMedia = [];
let galIdx = 0;
let lbMedia = [];
let lbIdx = 0;

function renderGallery(media, badgeCls, badgeTxt, promo, stock) {
  galMedia = media;
  galIdx = 0;
  renderGalMain(0, badgeCls, badgeTxt, promo, stock);
  renderGalThumbs(badgeCls, badgeTxt, promo, stock);
}

function renderGalMain(idx, badgeCls, badgeTxt, promo, stock) {
  const main = document.getElementById('gal-main');
  if (!main) return;
  galIdx = idx;
  const m = galMedia[idx];
  const isVid = m && m.type && m.type.startsWith('video');
  const isImg = m && !isVid;
  const stockInfo = stockBadgeStyle(stock);
  main.innerHTML = `
    ${badgeTxt ? `<div class="${badgeCls}">${badgeTxt}</div>` : ''}
    ${promo ? `<div class="gal-promo">${promo}</div>` : ''}
    <div class="gallery-origin">
      <span class="origin-flag">🇦🇷 Ind. Argentina</span>
      <span class="origin-flag">✈ Envíos</span>
    </div>
    ${isImg ? `<img src="${m.src}" alt="${m.alt||''}" onclick="openLightbox(${idx})" style="cursor:zoom-in">` : ''}
    ${isVid ? `<video src="${m.src}" controls autoplay muted loop playsinline style="width:100%;height:100%;object-fit:cover"></video>` : ''}
    ${!m ? knifeArt(0) : ''}
    ${galMedia.length > 1 ? `
      <button class="gal-arrow gal-arrow-prev" onclick="galNav(-1)" ${idx===0?'disabled':''}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="gal-arrow gal-arrow-next" onclick="galNav(1)" ${idx===galMedia.length-1?'disabled':''}>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
      </button>
      <div class="gal-counter">${idx+1} / ${galMedia.length}</div>
    ` : ''}
    <div style="position:absolute;bottom:${galMedia.length>1?'2.2rem':'.7rem'};left:.7rem;z-index:3;">
      <span style="font-size:8px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;padding:.22rem .55rem;border:1px solid ${stockInfo.color};color:${stockInfo.color};background:rgba(8,8,8,.8)">${stockInfo.text}</span>
    </div>
  `;
  // Store for arrow callbacks
  main._badgeCls = badgeCls; main._badgeTxt = badgeTxt; main._promo = promo; main._stock = stock;
}

function renderGalThumbs(badgeCls, badgeTxt, promo, stock) {
  const el = document.getElementById('gal-thumbs');
  if (!el) return;
  if (galMedia.length <= 1) { el.innerHTML = ''; return; }
  el.innerHTML = galMedia.map((m, i) => {
    const isVid = m.type && m.type.startsWith('video');
    const isImg = m && !isVid;
    return `<div class="gallery-thumb${i===0?' active':''}" onclick="galSelect(${i})">
      ${isImg ? `<img src="${m.src}" alt="">` : ''}
      ${isVid ? `<div class="gal-art-placeholder" style="inset:0;position:absolute">${knifeArt(i)}</div><div class="gal-thumb-play"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg></div>` : ''}
      ${!m.src ? `<svg class="gallery-thumb-art" viewBox="0 0 240 360" fill="none">${KNIFE_ARTS[0].replace(/^<svg[^>]*>/,'').replace(/<\/svg>$/,'')}</svg>` : ''}
    </div>`;
  }).join('');
}

function galNav(dir) {
  const main = document.getElementById('gal-main');
  if (!main) return;
  const newIdx = Math.max(0, Math.min(galMedia.length - 1, galIdx + dir));
  if (newIdx === galIdx) return;
  galSelect(newIdx);
}

function galSelect(idx) {
  const main = document.getElementById('gal-main');
  if (!main) return;
  renderGalMain(idx, main._badgeCls, main._badgeTxt, main._promo, main._stock);
  document.querySelectorAll('.gallery-thumb').forEach((t, i) => t.classList.toggle('active', i === idx));
  galIdx = idx;
}

/* ═══════════════════════════════════════════════
   LIGHTBOX
═══════════════════════════════════════════════ */
function openLightbox(idx) {
  const imgs = galMedia.filter(m => !m.type || !m.type.startsWith('video'));
  lbMedia = imgs;
  // Find position of this idx in images-only array
  let imgCount = 0;
  for (let i = 0; i <= idx; i++) { if (!galMedia[i]?.type?.startsWith('video')) imgCount++; }
  lbIdx = Math.min(imgCount - 1, lbMedia.length - 1);
  if (lbMedia.length === 0) return;
  renderLb();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderLb() {
  document.getElementById('lb-img').src = lbMedia[lbIdx]?.src || '';
  document.getElementById('lb-img').alt = lbMedia[lbIdx]?.alt || '';
  document.getElementById('lb-caption').textContent = lbMedia[lbIdx]?.alt || '';
  document.getElementById('lb-counter').textContent = lbMedia.length > 1 ? `${lbIdx+1} / ${lbMedia.length}` : '';
  document.getElementById('lb-prev').style.display = lbIdx === 0 ? 'none' : 'grid';
  document.getElementById('lb-next').style.display = lbIdx === lbMedia.length-1 ? 'none' : 'grid';
}

function lbNav(dir) {
  lbIdx = Math.max(0, Math.min(lbMedia.length - 1, lbIdx + dir));
  renderLb();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function lbClickOutside(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
});

/* ═══════════════════════════════════════════════
   SPECS TABLE BUILDER
═══════════════════════════════════════════════ */
function buildSpecsTable(d, p) {
  // d = p.details object, p = product
  if (!d) return '';
  const rows = [];

  // Parse characteristics into tags
  const chars = d.caracteristicas ? d.caracteristicas.split('·').map(c => c.trim()).filter(Boolean) : [];

  const add = (label, val, full) => {
    if (!val) return;
    rows.push({label, val: String(val), full: full || false});
  };

  add('Acero', d.acero);
  add('Largo de hoja', d.largoHoja);
  add('Largo total', d.largoTotal);
  add('Ancho hoja', d.ancho);
  add('Espesor', d.espesor);
  add('Ángulo de filo', d.filo);
  add('Dureza', d.dureza, false);
  add('Terminación', d.terminacion);
  add('Empuñadura', d.empunadura, true);
  add('Vaina', d.vaina, true);

  let tableHTML = rows.map(r => `
    <div class="spec-row${r.full?' full':''}">
      <span class="spec-row-label">${r.label}</span>
      <span class="spec-row-val">${r.val}</span>
    </div>
  `).join('');

  if (chars.length) {
    tableHTML += `
      <div class="spec-row chars">
        <span class="spec-row-label">Características</span>
        <div class="spec-chars-tags">
          ${chars.map(c => `<span class="spec-char-tag">${c}</span>`).join('')}
        </div>
      </div>
    `;
  }

  if (!tableHTML) return '';
  return `
    <div class="specs-section">
      <div class="specs-title">Especificaciones técnicas</div>
      <div class="specs-table">${tableHTML}</div>
    </div>
  `;
}

/* ═══════════════════════════════════════════════
   RELATED PRODUCTS
═══════════════════════════════════════════════ */
function buildRelated(allProducts, current) {
  // Same category first, then others
  let same = allProducts.filter(r => r.id !== current.id && r.active !== false && r.category === current.category);
  let other = allProducts.filter(r => r.id !== current.id && r.active !== false && r.category !== current.category);
  const related = [...same, ...other].slice(0, 3);
  if (!related.length) return '';

  const cards = related.map(r => {
    const rm = r.media && r.media.length ? r.media[0] : (r.image ? {src: r.image, type:'image/jpeg'} : null);
    const isVid = rm && rm.type && rm.type.startsWith('video');
    const empunadura = r.details?.empunadura || (r.specs && r.specs[1]) || '';
    const wi = woodInfo(empunadura);
    return `<div class="rel-card" onclick="location.href='producto.html?id=${r.id}'">
      <div class="rel-wood-bar" style="background:${wi.g}"></div>
      <div class="rel-img">
        ${rm && !isVid ? `<img src="${rm.src}" alt="${r.name}" loading="lazy">` : `<svg style="width:45%;opacity:.14;color:var(--cream)" viewBox="0 0 240 360" fill="none">${KNIFE_ARTS[0].replace(/^<svg[^>]*>/,'').replace(/<\/svg>$/,'')}</svg>`}
      </div>
      <div class="rel-body">
        <div class="rel-cat">${r.category || '—'}</div>
        <div class="rel-name">${r.name}</div>
        ${empunadura ? `<div class="rel-empunadura">Mango: ${empunadura.split(',')[0].split('+')[0].trim()}</div>` : ''}
        <div class="rel-price">${r.price || 'Consultar'}</div>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="related-section">
      <div class="sec-label">También puede interesarte</div>
      <h2 class="sec-h2">Otras <em>piezas</em></h2>
      <div class="related-grid">${cards}</div>
    </div>
  `;
}

  document.getElementById('nav-wa').href = waPresupuesto;

}

/* ═══════════════════════════════════════════════
   LOAD DATA
═══════════════════════════════════════════════ */
async function loadData() {
  let data = null;
  // 1) IndexedDB (admin tool stores here)
  try {
    const idb = await new Promise((res,rej) => {
      const r = indexedDB.open('gl_cuchillos', 1);
      r.onsuccess = e => res(e.target.result);
      r.onerror = rej;
    });
    const val = await new Promise((res,rej) => {
      const tx = idb.transaction('admin_data','readonly');
      const r = tx.objectStore('admin_data').get('data');
      r.onsuccess = e => res(e.target.result?.value ?? null);
      r.onerror = rej;
    });
    if (val) data = val;
  } catch(e) {}
  // 2) localStorage fallback
  if (!data) { try { const c = localStorage.getItem('gl_data'); if (c) data = JSON.parse(c); } catch(e) {} }
  // 3) products.json
  if (!data) { try { const r = await fetch('products.json?t=' + Date.now()); if (r.ok) data = await r.json(); } catch(e) {} }
  return data;
}

/* ═══════════════════════════════════════════════
   NOT FOUND
═══════════════════════════════════════════════ */
function renderNotFound(msg) {
  document.getElementById('main-content').innerHTML = `
    <div class="not-found">
      <div class="not-found-ico">🔪</div>
      <h2>${msg || 'Producto no encontrado'}</h2>
      <p>El producto no existe o fue eliminado.<br>Volvé al catálogo para ver todas las piezas.</p>
      <a href="tienda.html" style="display:inline-flex;align-items:center;gap:.6rem;font-size:9px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;padding:.8rem 2rem;background:var(--silver);color:var(--jet);margin-top:1rem">
        ← Volver a la tienda
      </a>
    </div>
  `;
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
(async function() {
  const params = new URLSearchParams(window.location.search);
  const idParam = params.get('id');

  if (!idParam) { renderNotFound('No se especificó ningún producto'); return; }

  const data = await loadData();
  const allProducts = data?.products || [];
  const waNum = (data?.settings?.whatsapp || '5493843458340').replace(/\D/g,'');

  const product = allProducts.find(p => String(p.id) === String(idParam));

  if (!product || product.active === false) {
    renderNotFound();
    return;
  }

  renderProduct(product, allProducts, waNum);
})();
</script>
